
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCK Smart Log</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Cyber Animations */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes cyber-walk {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .cyber-bg {
            background: linear-gradient(90deg, #0a0a0a, #1a1a2e, #0a0a0a);
            background-size: 200% 200%;
            animation: cyber-walk 10s linear infinite;
        }

        .glitch-text {
            position: relative;
            display: inline-block;
        }

        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 #ff00ff;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch 5s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -2px 0 #00ffff;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch 5s infinite linear alternate-reverse;
        }

        .cyber-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00f3ff;
            color: #00f3ff;
            font-family: 'JetBrains Mono', monospace;
            box-shadow: 0 0 5px rgba(0, 243, 255, 0.2);
            transition: all 0.3s ease;
        }

        .cyber-input:focus {
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
            outline: none;
            border-color: #ff00ff;
        }

        .neon-btn {
            position: relative;
            overflow: hidden;
            transition: 0.5s;
            letter-spacing: 4px;
        }

        .neon-btn:hover {
            background: #00f3ff;
            color: #050801;
            box-shadow: 0 0 5px #00f3ff, 0 0 25px #00f3ff, 0 0 50px #00f3ff, 0 0 200px #00f3ff;
        }

        /* High Precision Print Styles */
        @media print {
            @page { size: portrait; margin: 10mm 10mm 10mm 25mm; }
            body { background-color: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; font-size: 9pt; }
            .no-print { display: none !important; }
            #print-area {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
                border: none !important;
                display: block !important;
            }
            table { width: 100% !important; border-collapse: collapse !important; border: 1.5pt solid black !important; }
            th, td { 
                font-size: 8.5pt !important; 
                line-height: 1.1 !important; 
                padding: 2px !important;
                border: 1.5pt solid black !important;
            }
            .bg-yellow-400 { background-color: #facc15 !important; }
            .bg-gray-200 { background-color: #e5e7eb !important; }
            
            /* Ensure fixed heights don't overflow */
            textarea { min-height: unset !important; height: auto !important; }
            .min-h-\[22px\] { min-height: unset !important; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
